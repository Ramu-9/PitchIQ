spring.application.name=pitchiq-backend

# Database configuration (H2 for Local Verification)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/pitchiq}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:${SPRING_JPA_DDL_AUTO:update}}
spring.jpa.show-sql=false

# Server
server.port=${PORT:8080}


# Gemini API Key configuration
# Ensure GEMINI_API_KEY environment variable is set when using 'gemini' provider
gemini.api.key=${GEMINI_API_KEY:}

# AI Provider Configuration
pitchiq.ai.provider=${PITCHIQ_AI_PROVIDER:gemini}

# Cricket Data Provider Configuration
pitchiq.cricket.provider=${PITCHIQ_CRICKET_PROVIDER:mock}
cricapi.key=${CRICAPI_KEY:}
cricapi.base-url=${CRICAPI_BASE_URL:https://api.cricapi.com}
