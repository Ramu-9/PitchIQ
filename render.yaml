databases:
  - name: pitchiq-db
    databaseName: pitchiq
    user: pitchiq_user
    plan: free
    region: singapore

services:
  - type: web
    name: pitchiq-backend
    env: java
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/pitchiq-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: pitchiq-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: pitchiq-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: pitchiq-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: PITCHIQ_AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: PITCHIQ_CRICKET_PROVIDER
        value: cricapi
      - key: CRICAPI_KEY
        sync: false
